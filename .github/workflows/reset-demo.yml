name: Reset Demo User

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  reset-demo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Reset demo user
        run: npm run reset:demo
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ADMIN_EMAIL: kkotey475@gmail.com
          ADMIN_NAME: Kingsley Kotey
